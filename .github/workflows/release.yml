name: Build Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed --name AES_ECDH_Tool aes_ecdh_gui_v2.py

      - name: Create checksum
        shell: pwsh
        run: |
          cd dist
          Get-FileHash .\AES_ECDH_Tool.exe -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  AES_ECDH_Tool.exe" | Out-File -Encoding ascii AES_ECDH_Tool.exe.sha256
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/AES_ECDH_Tool.exe
            dist/AES_ECDH_Tool.exe.sha256

  build-linux:
    name: Build Linux binary, DEB and RPM
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk rpm curl

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install nFPM
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          "$HOME/go/bin/nfpm" --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux binary
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed --name AES_ECDH_Tool aes_ecdh_gui_v2.py
          chmod +x dist/AES_ECDH_Tool

      - name: Build DEB
        run: |
          nfpm package \
            --config packaging/linux/nfpm.yaml \
            --packager deb \
            --target dist/aes-ecdh-tool_${VERSION}_amd64.deb

      - name: Build RPM
        run: |
          nfpm package \
            --config packaging/linux/nfpm.yaml \
            --packager rpm \
            --target dist/aes-ecdh-tool-${VERSION}-1.x86_64.rpm

      - name: Create tar.gz
        run: |
          cd dist
          tar -czf AES_ECDH_Tool-linux-x86_64.tar.gz AES_ECDH_Tool

      - name: Create checksums
        run: |
          cd dist
          sha256sum AES_ECDH_Tool > AES_ECDH_Tool.sha256
          sha256sum AES_ECDH_Tool-linux-x86_64.tar.gz > AES_ECDH_Tool-linux-x86_64.tar.gz.sha256
          sha256sum *.deb > aes-ecdh-tool.deb.sha256
          sha256sum *.rpm > aes-ecdh-tool.rpm.sha256

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/AES_ECDH_Tool
            dist/AES_ECDH_Tool.sha256
            dist/AES_ECDH_Tool-linux-x86_64.tar.gz
            dist/AES_ECDH_Tool-linux-x86_64.tar.gz.sha256
            dist/*.deb
            dist/*.rpm
            dist/*.deb.sha256
            dist/*.rpm.sha256

  build-macos:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          pyinstaller --clean --noconfirm --windowed --name AES_ECDH_Tool aes_ecdh_gui_v2.py

      - name: Create zip
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent AES_ECDH_Tool.app AES_ECDH_Tool-macos.zip

      - name: Create checksum
        run: |
          cd dist
          shasum -a 256 AES_ECDH_Tool-macos.zip > AES_ECDH_Tool-macos.zip.sha256

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/AES_ECDH_Tool-macos.zip
            dist/AES_ECDH_Tool-macos.zip.sha256

  release:
    name: Sign and create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" release-assets/
          done

      - name: Display collected assets
        run: |
          find release-assets -maxdepth 1 -type f | sort

      - name: Create combined SHA256SUMS
        run: |
          cd release-assets
          find . -maxdepth 1 -type f \
            ! -name "*.asc" \
            ! -name "SHA256SUMS" \
            -printf "%P\0" | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Show imported GPG keys
        run: |
          gpg --list-secret-keys --keyid-format=long

      - name: Sign release assets
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd release-assets

          find . -maxdepth 1 -type f \
            ! -name "*.asc" \
            -print0 | while IFS= read -r -d '' file; do
              echo "Signing $file"

              if [ -n "$GPG_PASSPHRASE" ]; then
                gpg --batch --yes \
                  --pinentry-mode loopback \
                  --passphrase "$GPG_PASSPHRASE" \
                  --armor \
                  --detach-sign "$file"
              else
                gpg --batch --yes \
                  --armor \
                  --detach-sign "$file"
              fi
            done

      - name: Verify GPG signatures
        run: |
          cd release-assets

          find . -maxdepth 1 -type f \
            -name "*.asc" \
            -print0 | while IFS= read -r -d '' sig; do
              file="${sig%.asc}"
              echo "Verifying $sig -> $file"
              gpg --verify "$sig" "$file"
            done

      - name: Display final release files
        run: |
          find release-assets -maxdepth 1 -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
          generate_release_notes: true
