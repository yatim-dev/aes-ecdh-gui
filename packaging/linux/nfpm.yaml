name: aes-ecdh-tool
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Yarkov Timothy <yatim2002@gmail.com>
description: |
  GUI tool for X25519 ECDH key exchange and AES-256-GCM message encryption.
vendor: AES ECDH Tool
homepage: https://github.com/yatim-dev/aes-ecdh-gui
license: MIT

contents:
  - src: dist/AES_ECDH_Tool
    dst: /opt/aes-ecdh-tool/AES_ECDH_Tool

  - src: packaging/linux/AES_ECDH_Tool.desktop
    dst: /usr/share/applications/AES_ECDH_Tool.desktop
